<text x="656" y="122" class="head">UN Convention on the</text>
<text x="656" y="152" class="head">Rights of the Child</text>
<text x="656" y="178" style="font-size:13px;fill:#5A5246;letter-spacing:0.06em">1989 · Scored by OMISSION Platform · Gemini 2.5 Flash</text>

<line x1="656" y1="200" x2="1152" y2="200" stroke="#2F2B24" stroke-width="0.8"/>

<!-- Score cards -->
<rect x="656" y="220" width="148" height="80" rx="6" fill="#1C1A17" stroke="#2F2B24" stroke-width="0.8"/>
<text x="668" y="240" style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;fill:#5A5246">Current Score</text>
<text x="668" y="276" style="font-size:34px;font-weight:700;font-family:monospace;fill:#D4792C">62</text>
<text x="726" y="276" style="font-size:14px;fill:#5A5246;font-family:monospace">/100</text>

<rect x="816" y="220" width="148" height="80" rx="6" fill="#1C1A17" stroke="#2F2B24" stroke-width="0.8"/>
<text x="828" y="240" style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;fill:#5A5246">True Score</text>
<text x="828" y="276" style="font-size:34px;font-weight:700;font-family:monospace;fill:#A78BFA">26</text>
<text x="880" y="276" style="font-size:14px;fill:#5A5246;font-family:monospace">/100</text>

<rect x="976" y="220" width="176" height="80" rx="6" fill="#1C1A17" stroke="#E05A5A" stroke-width="0.8" stroke-opacity="0.4"/>
<text x="988" y="240" style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;fill:#5A5246">Risk Delta</text>
<text x="988" y="276" style="font-size:34px;font-weight:700;font-family:monospace;fill:#E05A5A">+36</text>
<text x="1044" y="280" style="font-size:11px;fill:#5A5246">hidden</text>

<line x1="656" y1="320" x2="1152" y2="320" stroke="#2F2B24" stroke-width="0.8"/>

<!-- Findings -->
<rect x="656" y="338" width="8" height="64" rx="2" fill="#E05A5A"/>
<text x="676" y="356" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;fill:#E05A5A">Self-Determination — ORI 3.03 — Omitted</text>
<text x="676" y="374" class="body">The child cannot refuse, initiate, or contest adoption.</text>
<text x="676" y="392" class="body">Article 12 grants the right to be heard — not to decide.</text>

<rect x="656" y="418" width="8" height="64" rx="2" fill="#E05A5A" opacity="0.7"/>
<text x="676" y="436" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;fill:#E05A5A">Consent — ORI 2.66 — Blind Spot</text>
<text x="676" y="454" class="body">Article 21(a) requires consent from "persons concerned".</text>
<text x="676" y="472" class="body">The adoptee is not a consenting party to their own adoption.</text>

<rect x="656" y="498" width="8" height="48" rx="2" fill="#E05A5A" opacity="0.4"/>
<text x="676" y="516" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;fill:#9A8E7A">Agency — ORI 1.40 — Blind Spot</text>
<text x="676" y="534" class="body">The child is the subject of proceedings. Never the initiating party.</text>

