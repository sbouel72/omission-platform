<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OMISSION Platform — UNCRC 1989 scored 62/100, True Score 26/100, Delta +36</title>
<desc>Abstract radar diagram showing the UN Convention on the Rights of the Child scored against 8 governance domains. The orange polygon collapses to near-zero on Consent, Self-Determination, and Agency — the domains the Convention structurally omits.</desc>
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .lbl    { font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; fill: #5A5246; }
  .lbl-hi { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #9A8E7A; }
  .word   { font-size: 15px; font-weight: 800; letter-spacing: 0.28em; text-transform: uppercase; fill: #EDE8DC; }
  .sub    { font-size: 11px; font-weight: 400; letter-spacing: 0.12em; fill: #5A5246; }
  .mono   { font-family: monospace; font-size: 12px; fill: #5A5246; }
  .mono-hi{ font-family: monospace; font-size: 12px; fill: #9A8E7A; }
  .head   { font-size: 22px; font-weight: 800; fill: #EDE8DC; letter-spacing: -0.01em; }
  .body   { font-size: 13px; font-weight: 400; fill: #9A8E7A; }
  .tag    { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; fill: #D4792C; }
</style>

