<line x1="310" y1="315" x2="152" y2="473" stroke="#2F2B24" stroke-width="0.8"/>
<line x1="310" y1="315" x2="86"  y2="315" stroke="#2F2B24" stroke-width="0.8"/>
<line x1="310" y1="315" x2="152" y2="157" stroke="#2F2B24" stroke-width="0.8"/>

<!-- True ring (W=1.0) -->
<polygon points="310,91 468,157 534,315 468,473 310,539 152,473 86,315 152,157"
