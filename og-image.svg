<!-- Axis spokes -->
<line x1="310" y1="315" x2="310" y2="91"  stroke="#2F2B24" stroke-width="0.8"/>
<line x1="310" y1="315" x2="468" y2="157" stroke="#2F2B24" stroke-width="0.8"/>
<line x1="310" y1="315" x2="534" y2="315" stroke="#2F2B24" stroke-width="0.8"/>
<line x1="310" y1="315" x2="468" y2="473" stroke="#2F2B24" stroke-width="0.8"/>
