<style>
*{box-sizing:border-box}
:root{
  --bg:#0F0E0C;
  --card:#1C1A17;
  --border:#2F2B24;
  --orange:#D4792C;
  --orange-l:#E89A5A;
  --amber:#F0BE6A;
  --text:#EDE8DC;
  --muted:#9A8E7A;
  --muted2:#5A5246;
  --rose:#E05A5A;
  --rose-l:#F59090;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;height:100dvh;overflow:hidden}
#root{height:100dvh}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
input[type=range]{width:100%;accent-color:var(--orange)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.o-btn{background:var(--orange);color:#0F0E0C;font-weight:600;border:none;cursor:pointer;border-radius:8px;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;transition:.15s}
.o-btn:hover{background:var(--orange-l)}
.o-btn:disabled{opacity:.35;cursor:not-allowed}
.o-btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);cursor:pointer;border-radius:8px;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;transition:.15s}
.o-btn-ghost:hover{color:var(--text);border-color:var(--muted2)}
.o-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.o-accent{color:var(--orange)}
.o-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.provider-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;color:var(--muted);transition:.15s;display:flex;align-items:center;gap:8px}
.provider-btn:hover{border-color:var(--muted2);color:var(--text)}
.provider-btn.active{border-color:var(--orange);background:rgba(212,121,44,.1);color:var(--orange)}

/* ── MOBILE ──────────────────────────────────────────────────── */
@media(max-width:640px){
  .o-btn{padding:10px 16px;font-size:13px}
  .o-btn-ghost{padding:10px 14px;font-size:13px}
  .provider-btn{padding:8px 12px;font-size:12px}
  /* bottom nav shown, side nav hidden */
  #side-nav{display:none!important}
  #bottom-nav{display:flex!important}
  /* main scroll area gets bottom padding for the tab bar */
  #main-scroll{padding-bottom:72px!important}
}
@media(min-width:641px){
  #bottom-nav{display:none!important}
  #side-nav{display:flex!important}
}
</style>
</head>

/* ── SVG RADAR ──────────────────────────────────────────────── */
function toXY(deg,r,cx,cy){const rad=((deg-90)*Math.PI)/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
function SvgRadar({data,keys,showLegend=false,vw=300,vh=260}){
  const n=data.length,cx=vw/2,cy=showLegend?vh/2-14:vh/2,r=Math.min(cx,cy)*0.72,step=360/n;
  return(<svg viewBox={`0 0 ${vw} ${vh}`} style={{width:"100%",height:"100%"}}>
    {[0.25,0.5,0.75,1].map(ring=>{const pts=data.map((_,i)=>{const p=toXY(i*step,r*ring,cx,cy);return`${p.x},${p.y}`;}).join(" ");return<polygon key={ring} points={pts} fill="none" stroke="#2F2B24" strokeWidth={0.8}/>;  })}
    {data.map((_,i)=>{const{x,y}=toXY(i*step,r,cx,cy);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#2F2B24" strokeWidth={0.8}/>;})}
    {data.map((d,i)=>{const{x,y}=toXY(i*step,r*1.22,cx,cy);return<text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="#9A8E7A" fontSize={9} fontFamily="system-ui">{d.subject}</text>;})}
    {keys.map(({key,color,opacity=0.25,sw=1.5})=>{const pts=data.map((d,i)=>{const v=Math.max(0,Math.min(100,d[key]||0))/100;const{x,y}=toXY(i*step,r*v,cx,cy);return`${x},${y}`;}).join(" ");return<polygon key={key} points={pts} fill={color} fillOpacity={opacity} stroke={color} strokeWidth={sw}/>;  })}
    {showLegend&&<g>{keys.map((dk,i)=>{const x=(vw/(keys.length+1))*(i+1)-30;return(<g key={dk.key} transform={`translate(${x},${vh-14})`}><rect x={0} y={0} width={10} height={6} fill={dk.color} fillOpacity={0.7}/><text x={14} y={6} fill="#9A8E7A" fontSize={8} fontFamily="system-ui">{dk.name||dk.key}</text></g>);})}</g>}
  </svg>);
}

/* ── MATH ───────────────────────────────────────────────────── */
const clamp01=x=>Math.max(0,Math.min(1,x));
const wEff=w=>Math.max(W_FLOOR,clamp01(w));
function perDomain(scores){
  return DOMAINS.map(d=>{
    const s=scores[d.id]||{H:0.5,W:0.5};
    const H=clamp01(s.H),W=wEff(s.W),Hid=-Math.log2(W),A=H*Hid;
    return{...d,H,W,Hid,A,evidence:s.evidence,confidence:s.confidence};
  });
}
function aggregate(rows){
  const n=rows.length,meanWH=rows.reduce((a,r)=>a+r.W*r.H,0)/n,meanH=rows.reduce((a,r)=>a+r.H,0)/n,
    meanW=rows.reduce((a,r)=>a+r.W,0)/n,sumH=rows.reduce((a,r)=>a+r.H,0),
    sumWH=rows.reduce((a,r)=>a+r.W*r.H,0),sumA=rows.reduce((a,r)=>a+r.A,0),
    maxA=Math.log2(1/W_FLOOR),currentScore=100*(1-meanWH),trueScore=100*(1-meanH),
    riskDelta=currentScore-trueScore,blindSpotCount=rows.filter(r=>r.W<0.3).length;
  return{currentScore,trueScore,riskDelta,visibilityCoverage:meanW*100,
    detectionRecall:sumH>0?(sumWH/sumH)*100:100,blindSpotDensity:(blindSpotCount/n)*100,
    omissionRiskIndex:(sumA/(n*maxA))*100,denominatorIntegrity:currentScore>0?Math.min(100,(trueScore/currentScore)*100):100,blindSpotCount};
}
function cosineSim(a,b){
  let dot=0,na=0,nb=0;for(const k of Object.keys(a)){dot+=(a[k]||0)*(b[k]||0);na+=(a[k]||0)**2;nb+=(b[k]||0)**2;}
  return dot/(Math.sqrt(na)*Math.sqrt(nb)||1);
}

function parseApiError(raw,provider){
  if(raw==="CORS")return{msg:"Network blocked",detail:provider.hints?.CORS||"This browser can't reach the API directly from a file:// URL.\n\nFix: serve via a local server:\n  python3 -m http.server 8080\nThen open: http://localhost:8080/omission-platform.html"};
  const m=raw.match(/^HTTP_(\d+):(.*)$/);
  if(m){const[,code,msg]=m,hint=provider.hints?.[code]||"";return{msg:`${code} — ${msg.trim()}`,detail:hint};}
  if(raw.includes("JSON"))return{msg:"Bad AI response — couldn't parse JSON",detail:"The model returned something unexpected. Try a different model or add more context to your documents."};
  return{msg:raw,detail:""};
}

function DeepScanPanel({onResult,onSkip}){

  const[model,setModel]=useState(PROVIDERS[0].defaultModel);
  const[status,setStatus]=useState("idle");
  const[error,setError]=useState(null);
  const inputRef=useRef(null);

  const switchProvider=p=>{setProvider(p);setModel(p.defaultModel);setApiKey("");setError(null);};

  const run=async()=>{
    if(!files.length){setError({msg:"Upload at least one document.",detail:""});return;}
    if(!apiKey){setError({msg:`Paste your ${provider.name} API key to continue.`,detail:""});return;}
    setStatus("reading");setError(null);
    try{
      const textParts=[];
      for(const f of files){const txt=await f.text();textParts.push(`### ${f.name}\n${txt.slice(0,6000)}`);}
      setStatus("calling");
      const domainList=DOMAINS.map(d=>`- ${d.id} (${d.name}): ${d.desc}`).join("\n");
      const sys=`You are a structural visibility analyst. Score governance documents against 8 domains.\n\nDomains:\n${domainList}\n\nFor each domain return H (0–1 float), W (0.01–1 float), evidence (≤12 words), confidence (low|medium|high).\n\nRespond ONLY with valid JSON:\n{"domains":{"identity":{"H":0.5,"W":0.5,"evidence":"...","confidence":"medium"},...},"summary":"≤30 words","redFlags":["..."]}`;
      const user=textParts.join("\n\n")+"\n\nScore all 8 domains now. Return only JSON.";
      const txt=await provider.call(apiKey,model,sys,user);
      const json=JSON.parse(txt.replace(/```json|```/g,"").trim());

           pros:["No API key needed","Works completely offline","Good starting point for any team"],
           cons:["Subject to self-report bias","Based on your knowledge, not documents"]},
          {id:"deepscan",icon:Bot,color:"#A78BFA",title:"Deep scan (AI)",time:"~2 minutes",
           why:"Upload your governance documents. An AI reads them and produces an evidence-based score with citations.",
           pros:["Evidence-based — tied to actual text","Reduces self-report bias","Supports Claude, GPT-4o, Gemini"],
           cons:["Needs an AI API key","Quality depends on document availability"]},
        ].map(m=>(
          <button key={m.id} onClick={()=>setMode(m.id)} className="text-left rounded-xl p-5 transition-all" style={{background:"var(--card)",border:`1px solid var(--border)`}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=m.color} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div className="flex items-center gap-2 mb-1">
              <m.icon size={18} style={{color:m.color}}/>
              <div className="font-bold" style={{color:"var(--text)"}}>{m.title}</div>
              <div className="text-xs rounded-full px-2 py-0.5 ml-auto" style={{background:m.color+"22",color:m.color}}>{m.time}</div>
            </div>
            <div className="text-sm mb-4" style={{color:"var(--muted)"}}>{m.why}</div>
            <div className="space-y-1">
              {m.pros.map(p=><div key={p} className="text-xs flex items-start gap-1.5" style={{color:"var(--muted)"}}><span style={{color:m.color,flexShrink:0}}>✓</span>{p}</div>)}
              {m.cons.map(c=><div key={c} className="text-xs flex items-start gap-1.5" style={{color:"var(--muted2)"}}><span style={{flexShrink:0}}>–</span>{c}</div>)}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
  return(<div>
    <button onClick={()=>setMode(null)} className="flex items-center gap-1 text-sm mb-6" style={{color:"var(--muted)",cursor:"pointer",background:"none",border:"none"}}>
      <ArrowLeft size={14}/> Change method
    </button>
    {mode==="quiz"
      ?<QuizPanel scores={scores} setScore={setScore} onComplete={onComplete}/>
      :<DeepScanPanel onSkip={()=>setMode("quiz")} onResult={json=>{applyDeepScan(json);onComplete();}}/>}
  </div>);
}

/* ── RESULTS ────────────────────────────────────────────────── */
function ScoringExplainer(){
  const[open,setOpen]=useState(false);
  return(<div className="rounded-xl mb-6" style={{background:"var(--card)",border:"1px solid var(--border)"}}>
    <button onClick={()=>setOpen(o=>!o)} className="w-full flex items-center justify-between p-4 text-sm font-semibold" style={{color:"var(--text)",background:"none",border:"none",cursor:"pointer"}}>
      <div className="flex items-center gap-2"><Info size={14} style={{color:"var(--orange)"}}/> How is the score calculated?</div>
      {open?<ChevronDown size={14} style={{color:"var(--muted)"}}/>:<ChevronRight size={14} style={{color:"var(--muted)"}}/>}
    </button>
    {open&&<div className="px-4 pb-4 space-y-4 text-sm" style={{borderTop:"1px solid var(--border)"}}>
      <div className="pt-4 grid md:grid-cols-2 gap-4">
        <div>
          <div className="font-semibold mb-1" style={{color:"var(--text)"}}>Two inputs per domain</div>
          <div style={{color:"var(--muted)"}}>
            <div className="mb-2"><strong style={{color:"var(--rose)"}}>H (Harm)</strong> — How severe is the worst-case impact on affected people if this domain is completely ignored? Rated 0 (no impact) to 1.0 (catastrophic, irreversible).</div>
            <div><strong style={{color:"var(--orange)"}}>W (Visibility)</strong> — Does your framework currently measure this domain? 1.0 = actively tracked. 0.01 = completely absent. This is a floor, not zero, because even a passing mention counts for something.</div>
          </div>
        </div>
        <div>
          <div className="font-semibold mb-1" style={{color:"var(--text)"}}>The calculation</div>
          <div style={{color:"var(--muted)"}}>
            <div className="mb-2"><strong style={{color:"var(--amber)"}}>Current Score</strong> = 100 × (1 − avg(W × H)). Each harm is weighted by its visibility. Invisible harms barely affect this number — which is the problem.</div>
            <div className="mb-2"><strong style={{color:"#A78BFA)"}}>True Score</strong> = 100 × (1 − avg(H)). What your score would be if everything were fully measured. This shows the underlying harm landscape.</div>
            <div><strong style={{color:"var(--rose)"}}>Risk Delta</strong> = Current − True. A positive gap means you appear healthier than you are. This is your hidden liability.</div>
          </div>
        </div>
      </div>
      <div className="rounded-lg p-3 text-sm" style={{background:"rgba(212,121,44,.06)",border:"1px solid rgba(212,121,44,.15)",color:"var(--muted)"}}>
        <strong style={{color:"var(--orange)"}}>Omission Risk Index</strong> = avg(H × −log₂(W)). This penalises domains with high harm that are nearly invisible. A domain with H=1 and W=0.01 contributes 6.64 — amplifying the danger of what the framework refuses to see.
      </div>
    </div>}
  </div>);
}

    <ScoringExplainer/>

    {/* Core metrics */}
    <div className="grid grid-cols-2 gap-3 mb-6">

      <MetricCard label="True Score"         value={fmt(agg.trueScore,0)}        tone="#A78BFA"       tooltip="What it would report if every domain were fully visible"/>

      <div>
        <div className="font-bold" style={{color:rubric.color}}>{fmt(agg.currentScore,0)} — {rubric.label}</div>

        <div className="flex gap-4 mt-3 text-xs" style={{color:"var(--muted2)"}}>

          {rows.map(r=><TreeNode key={r.id} label={`${r.name}`} value={fmt(r.W*r.H,3)} depth={2} tone={r.W*r.H>0.3?"var(--rose)":r.W*r.H>0.15?"var(--amber)":"var(--text)"}/>)}
        </TreeNode>
        <TreeNode label="True Score — if W=1 everywhere" value={fmt(agg.trueScore,1)} depth={1}>
          {rows.map(r=><TreeNode key={r.id} label={`${r.name} — H`} value={fmt(r.H,2)} depth={2} tone={r.H>0.6?"var(--rose)":r.H>0.3?"var(--amber)":"var(--text)"}/>)}
        </TreeNode>
        <TreeNode label="Omission Risk Index — H × −log₂(W)" value={fmt(agg.omissionRiskIndex,1)} suffix="%" depth={1} tone="var(--rose)">
          {rows.map(r=><TreeNode key={r.id} label={`${r.name}`} value={fmt(r.A,2)} depth={2} tone={r.A>1.5?"var(--rose)":r.A>0.5?"var(--amber)":"var(--text)"}/>)}

          {r.evidence&&<div className="text-xs mt-1 ml-6 italic" style={{color:"var(--muted2)"}}>"{r.evidence}" <span style={{color:"var(--muted2)"}}>({r.confidence} confidence)</span></div>}
        </div>)}

    </div>
  </div>);
}

/* ── SCENARIO ───────────────────────────────────────────────── */
function ScenarioStage({baseScores,rows}){
  const[overrides,setOverrides]=useState({});
  const[copied,setCopied]=useState(false);
  const scenScores=useMemo(()=>{const m={};DOMAINS.forEach(d=>{const b=baseScores[d.id]||{H:0.5,W:0.5},o=overrides[d.id]||{};m[d.id]={H:o.H??b.H,W:o.W??b.W};});return m;},[baseScores,overrides]);
  const scenRows=useMemo(()=>perDomain(scenScores),[scenScores]);
  const scenAgg=useMemo(()=>aggregate(scenRows),[scenRows]);
  const baseAgg=useMemo(()=>aggregate(rows),[rows]);
  const setW=(id,w)=>setOverrides(p=>({...p,[id]:{...p[id],W:w}}));
  const delta=scenAgg.currentScore-baseAgg.currentScore;
  const recText=delta!==0?`Scenario: Current Score moves ${delta>=0?"+":""}${fmt(delta,0)} points to ${fmt(scenAgg.currentScore,0)}.`:"No score change with current adjustments.";
  return(<div style={{maxWidth:760}}>
    <div className="o-tag">Scenario Simulation</div>
    <h2 className="text-2xl font-bold mb-2" style={{color:"var(--text)"}}>What if visibility changes?</h2>
    <p className="text-sm mb-6" style={{color:"var(--muted)"}}>Drag the W slider for any domain to simulate governance reform. Harm (H) stays fixed — this models what you <em>see</em>, not what you've fixed.</p>
    <div className="flex gap-2 flex-wrap mb-6" style={{maxWidth:"100%"}}>
      <button className="o-btn-ghost" style={{padding:"6px 14px",fontSize:12}} onClick={()=>setOverrides({})}>Reset to assessment</button>
      <button className="o-btn-ghost" style={{padding:"6px 14px",fontSize:12}} onClick={()=>{const o={};DOMAINS.forEach(d=>{o[d.id]={W:1.0};});setOverrides(o);}}>Make all domains mandatory</button>
    </div>
    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-8">
      <MetricCard label="Baseline score"    value={fmt(baseAgg.currentScore,0)} tone="var(--orange)"/>
      <MetricCard label="Scenario score"    value={fmt(scenAgg.currentScore,0)} tone="#A78BFA"/>
      <MetricCard label="Score change"      value={`${delta>=0?"+":""}${fmt(delta,0)}`} tone={delta<0?"var(--rose)":delta>0?"var(--orange)":"var(--muted)"} sub={delta<0?"More risk revealed":delta>0?"Looks healthier":"No change"}/>
    </div>
    <div className="space-y-5">
      {DOMAINS.map(d=>{
        const w=scenScores[d.id]?.W??0.5,h=scenScores[d.id]?.H??0.5;
        return(<div key={d.id}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-2 text-sm" style={{color:"var(--text)"}}><d.icon size={13} style={{color:"var(--muted2)"}}/>{d.name}<span className="font-mono text-xs" style={{color:"var(--muted2)"}}>H {fmt(h,2)}</span></div>
            <span className="font-mono text-xs" style={{color:"var(--orange)"}}>W {fmt(w,2)}</span>
          </div>
          <input type="range" min={0.01} max={1} step={0.01} value={w} onChange={e=>setW(d.id,parseFloat(e.target.value))}/>
        </div>);
      })}
    </div>
    <div className="mt-8 flex items-center gap-3">
      <div className="text-sm" style={{color:"var(--muted)"}}>{recText}</div>
      <button onClick={()=>{navigator.clipboard?.writeText(recText);setCopied(true);setTimeout(()=>setCopied(false),2000);}} className="flex items-center gap-1 text-xs" style={{color:"var(--orange)",background:"none",border:"none",cursor:"pointer"}}>
        {copied?<CheckCircle size={13}/>:<Copy size={13}/>}{copied?"Copied":"Copy"}
      </button>
    </div>
  </div>);
}

/* ── SIGNATURE ──────────────────────────────────────────────── */
function SignatureStage({rows}){
  const userW=Object.fromEntries(rows.map(r=>[r.id,r.W]));
  const sims=REFERENCE_SIGNATURES.map(ref=>({...ref,similarity:cosineSim(userW,ref.w)})).sort((a,b)=>b.similarity-a.similarity);
  const best=sims[0];
  const radarData=DOMAINS.map(d=>({subject:d.short,yours:Math.round(userW[d.id]*100),[best.id]:Math.round(best.w[d.id]*100),...(sims[1]?{[sims[1].id]:Math.round(sims[1].w[d.id]*100)}:{})}));
  const radarKeys=[
    {key:"yours",color:"var(--orange)",opacity:0.30,sw:2,name:"Yours"},
    {key:best.id,color:"#A78BFA",opacity:0.15,sw:1.5,name:best.name},
    ...(sims[1]?[{key:sims[1].id,color:"var(--amber)",opacity:0.10,sw:1,name:sims[1].name}]:[]),
  ];
  return(<div style={{maxWidth:760}}>
    <div className="o-tag">Structural Signature</div>
    <h2 className="text-2xl font-bold mb-6" style={{color:"var(--text)"}}>Which governance model does yours resemble?</h2>
    <div className="rounded-xl p-4 mb-6 flex items-start gap-4" style={{background:"var(--card)",border:"1px solid rgba(212,121,44,.3)"}}>
      <div className="w-2 self-stretch rounded-full flex-shrink-0" style={{background:"var(--orange)"}}/>
      <div>
        <div className="text-xs uppercase tracking-widest mb-1" style={{color:"var(--muted)"}}>Closest match</div>
        <div className="text-xl font-bold" style={{color:"var(--orange)"}}>{best.name}</div>
        <div className="text-sm mt-1" style={{color:"var(--muted)"}}>{best.note}</div>
        <div className="font-mono text-xs mt-2" style={{color:"var(--muted2)"}}>cosine similarity: {fmt(best.similarity*100,1)}%</div>
      </div>
    </div>
    <div style={{height:300}} className="mb-8"><SvgRadar data={radarData} keys={radarKeys} showLegend vw={700} vh={300}/></div>
    <div className="space-y-3">
      {sims.map((ref,i)=>{
        const c=i===0?"var(--orange)":i===1?"#A78BFA":"var(--amber)";
        return(<div key={ref.id} className="rounded-lg p-3" style={{border:`1px solid ${i===0?"rgba(212,121,44,.3)":"var(--border)"}`,background:"var(--card)"}}>
          <div className="flex items-center justify-between">
            <div className="text-sm font-semibold" style={{color:"var(--text)"}}>{ref.name}</div>
            <div className="font-mono text-xs" style={{color:c}}>{fmt(ref.similarity*100,1)}%</div>
          </div>
          <div className="text-xs mt-0.5 mb-2" style={{color:"var(--muted)"}}>{ref.note}</div>
          <div className="h-1.5 w-full rounded-full overflow-hidden" style={{background:"var(--border)"}}>
            <div className="h-full rounded-full" style={{width:`${ref.similarity*100}%`,background:c}}/>
          </div>
        </div>);
      })}
    </div>
  </div>);
}

/* ── RED TEAM ───────────────────────────────────────────────── */
function RedTeamStage({rows,deepScanMeta}){
  const highRisk=rows.filter(r=>r.H>0.5&&r.W<0.3);
  const nearInvis=rows.filter(r=>r.W<0.15);
  const topOmission=[...rows].sort((a,b)=>b.A-a.A).slice(0,3);
  const bsc=rows.filter(r=>r.W<0.3).length;
  const verdict=bsc>=4?"Your framework has systemic visibility gaps — more than half of domains are under-visible. This is a structural condition, not an oversight.":bsc>=2?"Significant blind spots exist. A targeted reform programme is recommended.":"Coverage is reasonable. Continue monitoring edge cases and newly emerging domains.";
  const findings=[
    {color:"var(--rose)",icon:EyeOff,title:"Invisible high-harm domains",
     body:highRisk.length>0?`${highRisk.map(r=>r.name).join(", ")} carry significant harm potential (H > 0.5) and are not being measured (W < 0.3). These are the platform's primary concern.`:"No domains with simultaneously high harm and low visibility. Good coverage in critical areas."},
    {color:"var(--amber)",icon:AlertTriangle,title:"Near-invisible domains",
     body:nearInvis.length>0?`${nearInvis.map(r=>r.name).join(", ")} are at or near the visibility floor (W < 0.15) and are effectively absent from your governance framework's perception.`:"No domains at the visibility floor. Every domain has at least nominal acknowledgement."},
    {color:"#A78BFA",icon:Target,title:"Highest omission risk — H × −log₂(W)",
     body:`Domains with the greatest structural omission risk: ${topOmission.map(r=>`${r.name} (ORI: ${fmt(r.A,2)})`).join(", ")}. These combine meaningful harm potential with low measurement — the formula's core concern.`},
    ...(deepScanMeta?.redFlags?.length>0?[{color:"var(--orange)",icon:Bot,title:"AI-identified red flags",body:deepScanMeta.redFlags.join(" · ")}]:[]),
  ];
  return(<div style={{maxWidth:640}}>
    <div className="o-tag">Red Team</div>
    <h2 className="text-2xl font-bold mb-2" style={{color:"var(--text)"}}>Adversarial challenge</h2>
    <p className="text-sm mb-8" style={{color:"var(--muted)"}}>A skeptical reviewer interrogates your framework's self-reported score. What would a critical outsider find?</p>
    <div className="space-y-4">
      {findings.map(c=>(
        <div key={c.title} className="rounded-xl p-4 flex gap-3" style={{border:`1px solid ${c.color}44`,background:`${c.color}08`}}>
          <c.icon size={16} style={{color:c.color,flexShrink:0,marginTop:2}}/>
          <div>
            <div className="font-semibold text-sm mb-1" style={{color:c.color}}>{c.title}</div>
            <div className="text-sm" style={{color:"var(--muted)"}}>{c.body}</div>
          </div>
        </div>
      ))}
    </div>
    <div className="mt-8 rounded-lg p-4 text-sm" style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--muted)"}}>
      <strong style={{color:"var(--text)"}}>Structural verdict: </strong>{verdict}
    </div>
  </div>);
}

/* ── CHALLENGE ──────────────────────────────────────────────── */
function ChallengeStage({rows,agg}){
  const visible=rows.filter(r=>r.W>=0.5),estimated=rows.filter(r=>r.W<0.5&&r.H>0),omitted=rows.filter(r=>r.W<0.1);
  const[copied,setCopied]=useState(false);
  const exportTxt=()=>{
    const txt=`OMISSION Platform Report\nDate: ${new Date().toLocaleString()}\n${"─".repeat(40)}\nCurrent Score: ${fmt(agg.currentScore,0)} / 100\nTrue Score:    ${fmt(agg.trueScore,0)} / 100\nRisk Delta:    +${fmt(agg.riskDelta,0)}\nBlind Spots:   ${agg.blindSpotCount} / ${DOMAINS.length}\n${"─".repeat(40)}\nVisible domains (W≥0.5):   ${visible.map(r=>r.name).join(", ")||"None"}\nEstimated (W<0.5, H>0):    ${estimated.map(r=>r.name).join(", ")||"None"}\nOmitted (W<0.1):           ${omitted.map(r=>r.name).join(", ")||"None"}\n${"─".repeat(40)}\nGenerated by OMISSION Governance Observability Platform`;
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([txt],{type:"text/plain"})),download:`omission_${Date.now()}.txt`});a.click();
  };
  const rubric=getRubric(agg.currentScore);
  return(<div style={{maxWidth:680}}>
    <div className="o-tag">Leadership Challenge</div>
    <div className="space-y-4 mt-4" style={{fontSize:18,lineHeight:1.7}}>
      <p style={{color:"var(--text)"}}>Your framework has been evaluated across eight domains of governance visibility.</p>
      <p style={{color:"var(--text)"}}>
        Your visible harms have been measured{visible.length>0?<span style={{color:"var(--orange)"}}> — {visible.map(r=>r.short).join(", ")}</span>:<span style={{color:"var(--muted)"}}> — none above the threshold</span>}.
      </p>
      <p style={{color:"var(--text)"}}>
        Your invisible harms have been estimated{estimated.length>0?<span style={{color:"var(--amber)"}}> — {estimated.map(r=>r.short).join(", ")}</span>:<span style={{color:"var(--muted)"}}> — none identified</span>}.
      </p>
      <p style={{color:"var(--text)"}}>
        Your omitted populations have been identified{omitted.length>0?<span style={{color:"var(--rose)"}}> — {omitted.map(r=>r.short).join(", ")}</span>:<span style={{color:"var(--muted)"}}> — none at current floor</span>}.
      </p>
      <div className="h-px my-2" style={{background:"var(--border)"}}/>
      <p className="font-semibold" style={{color:"var(--text)"}}>The question is no longer whether the framework works.</p>
      <p className="font-semibold" style={{color:"var(--orange)"}}>The question is whether the people it fails to see should accept the score it gives itself.</p>
    </div>
    <div className="mt-10 grid grid-cols-3 gap-3">
      <MetricCard label="Reports"      value={fmt(agg.currentScore,0)} tone="var(--orange)"/>
      <MetricCard label="Would report" value={fmt(agg.trueScore,0)}    tone="#A78BFA"/>
      <MetricCard label="Gap"          value={`+${fmt(agg.riskDelta,0)}`}    tone="var(--rose)"/>
    </div>
    <div className="mt-8 flex gap-3 flex-wrap">
      <button className="o-btn" onClick={exportTxt}><Download size={14}/> Export report</button>
      <button className="o-btn-ghost" onClick={()=>{navigator.clipboard?.writeText(`OMISSION | Reports ${fmt(agg.currentScore,0)} · True ${fmt(agg.trueScore,0)} · Gap +${fmt(agg.riskDelta,0)} · ${agg.blindSpotCount} blind spots · ${rubric.label}`);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
        {copied?<CheckCircle size={14} style={{color:"var(--orange)"}}/>:<Copy size={14}/>} {copied?"Copied!":"Copy summary"}
      </button>
      <button className="o-btn-ghost" onClick={()=>{if(navigator.share)navigator.share({title:"OMISSION Platform",text:`My governance score: ${fmt(agg.currentScore,0)} / 100 (true: ${fmt(agg.trueScore,0)}, gap: +${fmt(agg.riskDelta,0)})`,url:window.location.href}).catch(()=>{});}}><Share2 size={14}/> Share</button>
    </div>
  </div>);
}

/* ── APP ────────────────────────────────────────────────────── */
function App(){
  const[stage,setStage]=useState("story");
  const[scores,setScores]=useState(Object.fromEntries(DOMAINS.map(d=>[d.id,{H:undefined,W:undefined}])));
  const[deepScanMeta,setDeepScanMeta]=useState(null);
  const[completed,setCompleted]=useState(false);
  const setScore=useCallback((id,val)=>setScores(p=>({...p,[id]:val})),[]);
  const applyDeepScan=useCallback(json=>{
    const next={};
    DOMAINS.forEach(d=>{const r=json.domains?.[d.id];next[d.id]=r?{H:clamp01(r.H??0.5),W:wEff(r.W??0.5),evidence:r.evidence,confidence:r.confidence,source:"ai"}:{H:0.5,W:0.5,source:"default"};});
    setScores(next);setDeepScanMeta({summary:json.summary,redFlags:json.redFlags||[]});
  },[]);
  const safeScores=useMemo(()=>{const out={};DOMAINS.forEach(d=>{const s=scores[d.id]||{};out[d.id]={H:s.H??0.5,W:s.W??0.5,evidence:s.evidence,confidence:s.confidence};});return out;},[scores]);
  const rows=useMemo(()=>perDomain(safeScores),[safeScores]);
  const agg=useMemo(()=>aggregate(rows),[rows]);
  const unlocked=completed?STAGES.map(s=>s.id):["story","assess"];
  return(<div style={{display:"flex",height:"100dvh",width:"100%",overflow:"hidden",background:"var(--bg)",color:"var(--text)",flexDirection:"column"}}>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
    <NavRail stage={stage} setStage={setStage} unlocked={unlocked} rows={rows}/>
    <div style={{flex:1,overflowY:"auto"}} id="main-scroll-outer">
      <div id="main-scroll" style={{padding:"clamp(16px,4vw,32px) clamp(16px,4vw,32px) 80px"}}>
        {stage==="story"     &&<StoryStage onStart={()=>setStage("assess")}/>}
        {stage==="assess"    &&<AssessStage scores={scores} setScore={setScore} applyDeepScan={applyDeepScan} onComplete={()=>{setCompleted(true);setStage("results");}}/>}
        {stage==="results"   &&<ResultsStage rows={rows} agg={agg} deepScanMeta={deepScanMeta}/>}
        {stage==="scenario"  &&<ScenarioStage baseScores={safeScores} rows={rows}/>}
        {stage==="signature" &&<SignatureStage rows={rows}/>}
        {stage==="redteam"   &&<RedTeamStage rows={rows} deepScanMeta={deepScanMeta}/>}
        {stage==="challenge" &&<ChallengeStage rows={rows} agg={agg}/>}
      </div>
    </div>
    </div>
    {/* ── MOBILE BOTTOM TAB BAR ── */}
    <nav id="bottom-nav" style={{
      position:"fixed",bottom:0,left:0,right:0,height:56,
      background:"var(--bg)",borderTop:"1px solid var(--border)",
      display:"none",alignItems:"stretch",zIndex:50
    }}>
      {STAGES.map(s=>{
        const locked=!unlocked.includes(s.id),active=stage===s.id,Icon=s.icon;
        return(<button key={s.id} disabled={locked} onClick={()=>!locked&&setStage(s.id)} style={{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:2,border:"none",background:"transparent",cursor:locked?"not-allowed":"pointer",
          color:active?"var(--orange)":locked?"var(--border)":"var(--muted)",
          borderTop:active?"2px solid var(--orange)":"2px solid transparent",
          fontSize:8,fontWeight:600,letterSpacing:".05em",textTransform:"uppercase",transition:".15s"
        }}><Icon size={16}/><span>{s.label}</span></button>);
      })}
    </nav>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
